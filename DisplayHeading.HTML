<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>Bootstrap Typography Example</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="device-width", initial-scale=1>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    </head>

    <body>
        <div class="container">
            <h1>Heading Lists</h1>
            <h1 class="display-1">Codingal</h1>
            <h1 class="display-2">Codingal</h1>
            <h1 class="display-3">Codingal</h1>
            <h1 class="display-4">Codingal</h1>
        </div>
        <div class="container">
            <h1>Lighter, Secondary with small text and class text-muted <small-class=text-muted>Hello Codingal</small-class></h1>

            <dl>
                <dt>Coffee</dt>
                <dd>White hot drink</dd>
            </dl>

        </div>
    </body>
</html>
